<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habitat Avatar Simulator (1986)</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #0f3460;
    --highlight: #e94560;
    --text: #eee;
    --text-dim: #999;
    --border: #2a2a4a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 16px;
    border-bottom: 2px solid var(--border);
    background: var(--panel);
  }
  header h1 { font-size: 1.4em; letter-spacing: 2px; color: var(--highlight); }
  header p { color: var(--text-dim); font-size: 0.8em; margin-top: 2px; }
  .app {
    display: flex;
    max-width: 1400px;
    margin: 0 auto;
  }
  /* Left panel */
  .preview-panel {
    flex: 0 0 360px;
    padding: 16px;
    border-right: 2px solid var(--border);
    background: var(--panel);
    min-height: calc(100vh - 60px);
    overflow-y: auto;
  }
  .canvas-wrap {
    background: #A3A3A3;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 12px;
    text-align: center;
    overflow: hidden;
  }
  #avatarCanvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    margin: 0 auto;
    max-width: 100%;
    height: auto;
  }
  .view-label {
    text-align: center;
    font-size: 0.7em;
    color: #555;
    margin-top: 4px;
  }
  .controls { width: 100%; }
  .control-group { margin-bottom: 12px; }
  .control-group label {
    display: block; font-size: 0.75em; color: var(--text-dim);
    margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;
  }
  .btn-row { display: flex; gap: 4px; width: 100%; flex-wrap: wrap; }
  .btn {
    flex: 1; padding: 7px 10px; background: var(--accent); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    font-family: inherit; font-size: 0.8em; transition: background 0.15s;
    text-align: center; min-width: 60px;
  }
  .btn:hover { background: var(--highlight); }
  .btn.active { background: var(--highlight); font-weight: bold; }
  .btn.primary { background: var(--highlight); font-size: 0.9em; padding: 10px; }
  .btn.primary:hover { background: #ff5a75; }
  .btn.full { flex: 0 0 100%; }
  .btn.sequence { background: #8b5e3c; }
  .btn.sequence:hover { background: #a06e4c; }
  .btn.sequence.active { background: #a06e4c; font-weight: bold; }
  .sequence-panel {
    display: none; background: var(--bg); border: 2px solid #8b5e3c; border-radius: 6px;
    padding: 10px; margin-top: 8px;
  }
  .sequence-panel.active { display: block; }
  .sequence-step {
    font-size: 0.8em; color: var(--text); margin-bottom: 8px;
    padding: 6px 8px; background: var(--panel); border-radius: 4px;
    border-left: 3px solid #8b5e3c;
  }
  .sequence-step .step-num { color: #8b5e3c; font-weight: bold; }
  .sequence-step .step-desc { color: var(--text-dim); font-size: 0.9em; }
  .sequence-controls { display: flex; gap: 4px; margin-top: 6px; }
  .sequence-controls .btn { font-size: 0.75em; }
  .sequence-progress {
    display: flex; gap: 2px; margin-bottom: 6px;
  }
  .sequence-progress .pip {
    flex: 1; height: 4px; border-radius: 2px; background: var(--border);
    transition: background 0.3s;
  }
  .sequence-progress .pip.done { background: #8b5e3c; }
  .sequence-progress .pip.current { background: var(--highlight); }
  .head-info {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px; font-size: 0.75em; width: 100%; margin-top: 8px;
  }
  .head-info h3 { color: var(--highlight); margin-bottom: 4px; text-transform: capitalize; }
  .head-info .detail { color: var(--text-dim); margin-bottom: 2px; }
  .tag {
    display: inline-block; background: var(--accent); padding: 2px 6px;
    border-radius: 3px; font-size: 0.8em; margin: 1px;
  }
  .tag.player { background: #2e7d32; }
  .tag.animated { background: #8b5e3c; }
  .tag.female { background: #7b3080; }
  .palette-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .palette-row span { font-size: 0.7em; color: var(--text-dim); width: 55px; }
  .palette-row input[type="color"] {
    width: 36px; height: 24px; border: 1px solid var(--border);
    border-radius: 3px; cursor: pointer; background: none; padding: 0;
  }
  .palette-presets { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
  .palette-preset {
    display: flex; gap: 1px; cursor: pointer; border: 2px solid transparent;
    border-radius: 3px; padding: 1px; transition: border-color 0.15s;
  }
  .palette-preset:hover, .palette-preset.active { border-color: var(--highlight); }
  .palette-preset .swatch { width: 12px; height: 12px; border-radius: 1px; }
  .pattern-zone { margin-bottom: 6px; }
  .pattern-zone > span { font-size: 0.7em; color: var(--text-dim); display: block; margin-bottom: 2px; }
  .pattern-swatches { display: flex; gap: 2px; flex-wrap: wrap; }
  .pattern-swatch {
    width: 24px; height: 24px; cursor: pointer;
    border: 2px solid transparent; border-radius: 2px;
    image-rendering: pixelated; transition: border-color 0.15s;
  }
  .pattern-swatch:hover { border-color: var(--text-dim); }
  .pattern-swatch.active { border-color: var(--highlight); }
  /* Right panel */
  .browse-panel {
    flex: 1; min-width: 300px; padding: 16px;
    overflow-y: auto; max-height: calc(100vh - 60px);
  }
  .filter-bar {
    display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center;
  }
  .filter-bar input[type="text"] {
    flex: 1; min-width: 150px; padding: 6px 10px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 4px; color: var(--text);
    font-family: inherit; font-size: 0.85em;
  }
  .filter-bar select {
    padding: 6px 8px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: inherit; cursor: pointer;
  }
  .head-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px;
  }
  .head-card {
    background: var(--panel); border: 2px solid var(--border); border-radius: 5px;
    padding: 6px; cursor: pointer; text-align: center;
    transition: border-color 0.15s, transform 0.1s; position: relative;
  }
  .head-card:hover { border-color: var(--highlight); transform: translateY(-1px); }
  .head-card.selected { border-color: var(--highlight); background: var(--accent); }
  .head-card canvas {
    image-rendering: pixelated; image-rendering: crisp-edges;
    display: block; margin: 0 auto 3px; background: #A3A3A3; border-radius: 2px;
  }
  .head-card .name { font-size: 0.6em; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .head-card .badge {
    position: absolute; top: 2px; right: 2px; width: 7px; height: 7px; border-radius: 50%;
  }
  .head-card .badge.anim { background: #f0a020; }
  .stats { text-align: center; font-size: 0.7em; color: var(--text-dim); margin-bottom: 8px; }
  @media (max-width: 800px) {
    .app { flex-direction: column; }
    .preview-panel { flex: none; border-right: none; border-bottom: 2px solid var(--border); min-height: auto; }
    .browse-panel { max-height: none; }
  }
</style>
</head>
<body>

<header>
  <h1>HABITAT AVATAR SIMULATOR</h1>
  <p>Lucasfilm Games / Quantum Link, 1986 &mdash; Assemble and explore avatars from the first MMO</p>
</header>

<div class="app">
  <div class="preview-panel">
    <div class="canvas-wrap">
      <canvas id="avatarCanvas" width="400" height="440"></canvas>
      <div class="view-label" id="viewLabel">Side View &mdash; Standing</div>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>View</label>
        <div class="btn-row">
          <button class="btn active" data-view="side">Side</button>
          <button class="btn" data-view="front">Front</button>
          <button class="btn" data-view="back">Back</button>
        </div>
      </div>

      <div class="control-group">
        <label>Pose</label>
        <div class="btn-row">
          <button class="btn active" data-pose="stand">Stand</button>
          <button class="btn" data-pose="walk">Walk</button>
          <button class="btn" data-pose="wave">Wave</button>
          <button class="btn" data-pose="point">Point</button>
          <button class="btn" data-pose="bend">Bend</button>
        </div>
      </div>

      <div class="control-group">
        <div class="btn-row">
          <button class="btn primary full" id="randomBtn">Shuffle Random Avatar</button>
        </div>
        <div class="btn-row" style="margin-top:4px">
          <button class="btn" id="prevBtn">&larr; Prev</button>
          <button class="btn" id="nextBtn">Next &rarr;</button>
        </div>
        <div class="btn-row" style="margin-top:4px">
          <button class="btn" id="framePrevBtn">&larr; Frame</button>
          <span id="frameLabel" style="color:var(--text-dim);font-size:0.75em;min-width:60px;text-align:center">—</span>
          <button class="btn" id="frameNextBtn">Frame &rarr;</button>
        </div>
        <div class="btn-row" style="margin-top:4px">
          <button class="btn full" id="showHeadBtn">Show in Grid</button>
        </div>
        <div class="btn-row" style="margin-top:4px">
          <button class="btn sequence full" id="headChangeBtn">Head Change Sequence</button>
        </div>
        <div class="sequence-panel" id="sequencePanel">
          <div class="sequence-progress" id="sequenceProgress"></div>
          <div class="sequence-step" id="sequenceStep">
            <span class="step-num"></span> <span class="step-desc"></span>
          </div>
          <div class="sequence-controls">
            <button class="btn sequence" id="seqAutoBtn">Autoplay</button>
            <button class="btn sequence" id="seqNextBtn">Start</button>
            <button class="btn" id="seqStopBtn">Exit</button>
          </div>
        </div>
      </div>

      <div class="control-group">
        <label>Body Colors</label>
        <div class="palette-row">
          <label><input type="checkbox" id="pureColors"> Pure emulated colors</label>
        </div>
        <div class="palette-row">
          <span>Blue</span>
          <input type="color" id="color1" value="#312893">
        </div>
        <div class="palette-row">
          <span>Black</span>
          <input type="color" id="color2" value="#000000">
        </div>
        <div class="palette-row">
          <span>Pink</span>
          <input type="color" id="color3" value="#A96F63">
        </div>
        <label style="margin-top:6px">Presets</label>
        <div class="palette-presets" id="palettePresets"></div>
      </div>

      <div class="control-group">
        <label>Clothing Patterns</label>
        <div class="pattern-zone"><span>Torso</span><div class="pattern-swatches" id="patTorsoSwatches"></div></div>
        <div class="pattern-zone"><span>Arms</span><div class="pattern-swatches" id="patArmsSwatches"></div></div>
        <div class="pattern-zone"><span>Legs</span><div class="pattern-swatches" id="patLegsSwatches"></div></div>
      </div>

      <div class="head-info" id="headInfo">
        <h3>Select a head</h3>
        <div class="detail">Click any head or press Shuffle</div>
      </div>
    </div>
  </div>

  <div class="browse-panel">
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search heads...">
      <select id="categoryFilter">
        <option value="all">All Heads</option>
        <option value="player">Player (0-7)</option>
        <option value="human">Human</option>
        <option value="animal">Animal</option>
        <option value="monster">Monster</option>
        <option value="occupation">Occupation</option>
        <option value="popculture">Pop Culture</option>
        <option value="animated">Animated</option>
      </select>
    </div>
    <div class="stats" id="stats"></div>
    <div class="head-grid" id="headGrid"></div>
  </div>
</div>

// ============================================================
// CLOTHING PATTERNS (from C64 paint.m cel_patterns table)
// ============================================================
// 16 patterns, each 4 bytes defining a 4-scanline repeating tile.
// Each byte = 4 multicolor pixels (2 bits each).
// Pixel values: 00=transparent, 01=clothing color, 10=detail color, 11=wild color.
// In the C64, blue(01) pixels in the cel data get replaced by the pattern.
const CEL_PATTERNS = [
  [0x00,0x00,0x00,0x00], //  0: transparent/glass
  [0xAA,0xAA,0xAA,0xAA], //  1: 50% dither
  [0xFF,0xFF,0xFF,0xFF], //  2: solid (default)
  [0xE2,0xE2,0xE2,0xE2], //  3: partial fill
  [0x8B,0xBE,0x0F,0xCC], //  4: complex plaid
  [0xEE,0x00,0xEE,0x00], //  5: horizontal stripes
  [0xF0,0xF0,0x0F,0x0F], //  6: vertical stripes
  [0x22,0x88,0x22,0x88], //  7: pinstripe
  [0x32,0x88,0x23,0x88], //  8: offset dots
  [0x00,0x28,0x3B,0x0C], //  9: sparse diagonal
  [0x33,0xCC,0x33,0xCC], // 10: diagonal stripes
  [0x08,0x80,0x0C,0x80], // 11: very sparse dots
  [0x3F,0x3F,0xF3,0xF3], // 12: wide vertical
  [0xAA,0x3F,0xAA,0xF3], // 13: mixed checker/stripe
  [0xAA,0x00,0xAA,0x00], // 14: dotted stripes
  [0x55,0x55,0x55,0x55], // 15: 50% checker (offset)
];

// Pattern names reflecting actual pixel content:
// BG=transparent, CLR=clothing, BLK=detail/black, WLD=wild/pink
const PATTERN_NAMES = [
  'Transparent',   //  0: all BG
  'Solid Black',   //  1: all BLK (detail color)
  'Solid Wild',    //  2: all WLD (wild/pink color)
  'WLD/BLK/BG',    //  3: mixed vertical bars
  'Plaid',         //  4: complex mixed
  'H-Stripe',      //  5: WLD+BLK rows / BG rows
  'V-Stripe',      //  6: WLD columns / BG columns
  'BG/BLK Check',  //  7: BG and BLK checkerboard
  'Mixed Dots',    //  8: scattered BLK/WLD dots
  'Sparse',        //  9: few BLK/WLD dots on BG
  'BG/WLD Check',  // 10: BG and WLD checkerboard
  'Very Sparse',   // 11: very few dots
  'Wide V-Stripe', // 12: wide WLD/BG vertical

// IMAGE LOADING
// ============================================================
const imgCache = {};
function loadImg(src) {
  if (imgCache[src]) return Promise.resolve(imgCache[src]);
  return new Promise(r => {
    const img = new Image();
    img.onload = () => { imgCache[src] = img; r(img); };
    img.onerror = () => r(null);
    img.src = src;
  });
}

// Source palette in body PNGs (pure emulated colors from decode_avatar_bin.py)
const SRC_COLORS = [[0,0,255],[0,0,0],[255,85,255]];
// Head PNGs may use CRT-attenuated colors (from habitat_renderer.py with --palette)
// Map: CRT blue(49,40,147)→idx 0, CRT black(0,0,0)→idx 1, CRT pink(169,111,99)→idx 2
const SRC_COLORS_CRT = [[49,40,147],[0,0,0],[169,111,99]];

function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

function recolorCanvas(srcCanvas, srcColors, targetHexColors) {
  const target = targetHexColors.map(hexToRgb);
  const ctx = srcCanvas.getContext('2d');
  const d = ctx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
  const px = d.data;
  // Try both pure and CRT source palettes (heads use CRT, bodies use pure)
  const palettes = [srcColors, SRC_COLORS_CRT];
  for (let i = 0; i < px.length; i += 4) {
    if (px[i+3] < 128) continue;
    let matched = false;
    for (const pal of palettes) {
      for (let c = 0; c < pal.length; c++) {
        const [sr,sg,sb] = pal[c];
        if (Math.abs(px[i]-sr)<40 && Math.abs(px[i+1]-sg)<40 && Math.abs(px[i+2]-sb)<40) {
          px[i]=target[c][0]; px[i+1]=target[c][1]; px[i+2]=target[c][2];
          matched = true;
          break;
        }
      }
      if (matched) break;
    }
  }
  ctx.putImageData(d, 0, 0);
}

// Pattern-aware recolor: applies a pattern to blue(01) pixels
// patternIdx: index into CEL_PATTERNS (0-15), 2=solid (no pattern effect)
function recolorWithPattern(srcCanvas, srcColors, targetHexColors, patternIdx) {
  if (patternIdx === 15) {
    // Pattern 15 (0x55) = all 01 = solid clothing color = same as normal recolor
    return recolorCanvas(srcCanvas, srcColors, targetHexColors);
  }
  const target = targetHexColors.map(hexToRgb);
  const pattern = CEL_PATTERNS[patternIdx] || CEL_PATTERNS[2];
  const ctx = srcCanvas.getContext('2d');
  const d = ctx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
  const px = d.data;
  const w = srcCanvas.width;
  // Colors: target[0]=blue/clothing, target[1]=black/detail, target[2]=pink/wild
  for (let i = 0; i < px.length; i += 4) {
    if (px[i+3] < 128) continue;
    const pixIdx = i / 4;
    const x = pixIdx % w;
    const y = Math.floor(pixIdx / w);
    // Check which source color this pixel matches (try both pure and CRT palettes)
    let matched = -1;
    const palettes = [srcColors, SRC_COLORS_CRT];
    for (const pal of palettes) {
      for (let c = 0; c < pal.length; c++) {
        const [sr,sg,sb] = pal[c];
        if (Math.abs(px[i]-sr)<40 && Math.abs(px[i+1]-sg)<40 && Math.abs(px[i+2]-sb)<40) {
          matched = c;
          break;
        }
      }
      if (matched >= 0) break;
    }
    if (matched < 0) continue;
    if (matched === 0) {
      // Blue/clothing pixel (cel value 01) — apply pattern
      // Pattern byte for this scanline (repeats every 4 rows)
      const patByte = pattern[y % 4];
      // Each MC pixel = 2 PNG pixels (due to 2x stretch)
      // Each pattern byte covers 4 MC pixels = 8 PNG pixels
      const mcX = Math.floor(x / 2) % 4; // which MC pixel within the byte (0-3)
      const shift = 6 - mcX * 2; // bits 7-6, 5-4, 3-2, 1-0
      const patVal = (patByte >> shift) & 0x03;
      // Map pattern pixel value to color
      // C64: the base clothing area is filled with the clothing color first,
      // then the pattern modifies specific pixels. Pattern value 00 means
      // "keep the base clothing color" (not transparent, not background).
      if (patVal === 0) {
        // Base clothing color — same as pattern value 01
        px[i]=target[0][0]; px[i+1]=target[0][1]; px[i+2]=target[0][2];
      } else if (patVal === 1) {
        // clothing color (blue target)
        px[i]=target[0][0]; px[i+1]=target[0][1]; px[i+2]=target[0][2];
      } else if (patVal === 2) {
        // detail color (black target)
        px[i]=target[1][0]; px[i+1]=target[1][1]; px[i+2]=target[1][2];
      } else {
        // wild color (pink target)
        px[i]=target[2][0]; px[i+1]=target[2][1]; px[i+2]=target[2][2];
      }
    } else {
      // Non-blue pixel: just recolor normally
      px[i]=target[matched][0]; px[i+1]=target[matched][1]; px[i+2]=target[matched][2];
    }
  }
  ctx.putImageData(d, 0, 0);
}

let bodyColors = ["#312893","#000000","#A96F63"];
let headColors = ["#312893","#000000","#A96F63"];

function getCelNum(limbName, stateIdx) {
  if (stateIdx === null || stateIdx === undefined) return null;
  const states = LIMB_STATES[limbName];
  if (!states || stateIdx >= states.length) return null;
  const cel = states[stateIdx];
  return cel === 255 ? null : cel;
}

function getPoseConfig() {
  const poseData = POSES[currentPose];
  if (!poseData) return POSES.stand.side;
  const viewData = poseData[currentView] || poseData.side;
  if (Array.isArray(viewData)) {
    return viewData[animFrame % viewData.length];
  }
  return viewData;
}

function getHeadCelsForView(head, viewState) {
  // viewState: 0=side, 1=front, 2=back, 3=frown
  //
  // C64 facing values: 0=side, 1=front, 3=back
  // The start_end table has 4 pairs (8 bytes) indexed by facing*2:
  //   [side_start, side_end, front_start, front_end,
  //    unused_start, unused_end, back_start, back_end]
  //
  // Map our viewState to C64 facing:
  const facingMap = [0, 1, 3, 0]; // view 0→facing 0, view 1→facing 1, view 2→facing 3, view 3→facing 0
  const facing = facingMap[viewState] || 0;

  // Look up the correct state from the start_end table
  const cfg = headConfig ? headConfig[head.name] : null;
  let celState;

  if (cfg && cfg.start_end && cfg.start_end.length >= 8) {
    // Use the actual C64 start_end table
    const startIdx = facing * 2;
    celState = cfg.start_end[startIdx] & 0x7F; // mask off cycle bit
  } else {
    // Fallback when no config available
    celState = viewState;
    const numStates = head.masks.length;
    if (celState >= numStates) {
      celState = (viewState === 2) ? numStates - 1 : 0;
    }
  }

  // Clamp to available masks
  if (celState >= head.masks.length) celState = 0;

  const mask = head.masks[celState];
  const cels = [];
  for (let i = 0; i < mask.length; i++) {
    if (mask[i] === '1') cels.push(i);
  }
  return cels;
}

// Reference torso y_offset for standing side pose (torso cel 0)
// ============================================================
// C64 AVATAR POSITIONING ENGINE
// Ported from animate.m (display_avatar, draw_a_limb, get_cel_loc_addr)
// mix.m (get_cel_xy, find_cel_xy) and paint.m (paint_1)
// ============================================================
// The C64 processes all 6 limbs in order 0-5 to compute chained positions
// using x_rel/y_rel, then draws them in view-specific draw order.
// Limb indices: 0=legs_right, 1=legs_left, 2=left_arm, 3=torso, 4=head_placeholder, 5=right_arm
const LIMB_ORDER = ['legs_right','legs_left','left_arm','torso','head_placeholder','right_arm'];
// cels_affected_by_height: legs(0,1) unaffected, upper body(2-5) shifts
const CELS_AFFECTED_BY_HEIGHT = [0, 0, 1, 1, 1, 1];
const AVATAR_HEIGHT = 0; // 0=tallest, 15=shortest (scanline adjustment for upper body)

// Bytes-to-display-pixels: 1 byte = 4 MC pixels = 8 PNG pixels (at 2x scale) × SCALE
const BYTE_PX = 8 * SCALE; // = 32 display pixels per byte

// Compute chained positions for all 6 limbs (from C64 find_cel_xy / mix.m)
// Returns { cx_tab, cy_tab } in byte/scanline units relative to avatar origin
//
// C64 logic: cel_x_origin/cel_y_origin are the avatar's FIXED base position.
// When the previous cel's x_rel AND y_rel are both 0, the position resets to origin.
// Otherwise, x_rel/y_rel are added to the RUNNING position (cel_x/cel_y).
async function computeLimbPositions(pose, isBack) {
  const cel_x_origin = 0; // FIXED avatar origin (bytes) — never changes
  const cel_y_origin = 0; // FIXED avatar origin (scanlines) — never changes
  let cel_x = 0; // running position
  let cel_y = 0;
  let cel_x_rel = 0; // x_rel/y_rel from the previous cel
  let cel_y_rel = 0;

  const cx_tab = new Array(6).fill(0);
  const cy_tab = new Array(6).fill(0);

  // Process limbs in order 0-5 (matching C64 display_avatar loop)
  for (let i = 0; i < 6; i++) {
    const limbName = LIMB_ORDER[i];
    const stateIdx = pose[limbName] ?? pose[limbName.replace('head_placeholder','')];

    // Skip if limb not drawn, but still need to process chaining
    let celData = null;
    if (limbName === 'head_placeholder') {
      const headState = pose.head_state || 0;
      const hpCelNum = getCelNum('head_placeholder', headState);
      if (hpCelNum !== null) celData = await getBodyCelImage('head_placeholder', hpCelNum);
    } else if (stateIdx !== null && stateIdx !== undefined) {
      const celNum = getCelNum(limbName, stateIdx);
      if (celNum !== null) celData = await getBodyCelImage(limbName, celNum);
    }

    // find_cel_xy (mix.m): if previous cel's x_rel AND y_rel are both 0 → reset to origin
    // otherwise → add x_rel/y_rel to running position
    if (cel_x_rel === 0 && cel_y_rel === 0) {
      // Absolute: reset to fixed origin
      cel_x = cel_x_origin;
      cel_y = cel_y_origin;
    } else {
      // Relative: add to running position (not origin!)
      // For back view, x_rel is negated (C64: EOR #0xFF + SEC)
      const adj_x_rel = isBack ? -cel_x_rel : cel_x_rel;
      cel_x = cel_x + adj_x_rel;
      cel_y = cel_y - cel_y_rel;
    }

    // Store position
    cx_tab[i] = cel_x;
    // Height adjustment: only affects upper body cels (limbs 2-5)
    cy_tab[i] = cel_y + (CELS_AFFECTED_BY_HEIGHT[i] ? AVATAR_HEIGHT : 0);

    // Read x_rel, y_rel from this cel for chaining to next limb
    if (celData) {
      cel_x_rel = celData.x_rel || 0;
      cel_y_rel = celData.y_rel || 0;
    } else {
      cel_x_rel = 0;
      cel_y_rel = 0;
    }
  }

  return { cx_tab, cy_tab };
}

// Offscreen canvas for rendering avatar before centering
const offCanvas = document.createElement('canvas');
offCanvas.width = OFFSCREEN_W;
offCanvas.height = OFFSCREEN_H;
const offCtx = offCanvas.getContext('2d');

// activeCtx is used by drawBodyLimb/drawHead — points to offscreen during render
let activeCtx = ctx;

async function renderAvatar() {
  // If sequence is active, delegate to sequence renderer
  if (seqActive) {
    renderSequenceFrame(HEAD_CHANGE_STEPS[seqStep]);
    return;
  }

  // Step 1: Render onto offscreen canvas
  offCtx.clearRect(0, 0, OFFSCREEN_W, OFFSCREEN_H);
  activeCtx = offCtx;

  const pose = getPoseConfig();
  const drawOrder = DRAW_ORDER[currentView] || DRAW_ORDER.side;
  const isBack = currentView === 'back';

  const { cx_tab, cy_tab } = await computeLimbPositions(pose, isBack);

  offCtx.imageSmoothingEnabled = false;

  for (const limbKey of drawOrder) {
    if (limbKey === 'head') {
      await drawHead(pose, cx_tab, cy_tab);
    } else {
      const limbIdx = LIMB_ORDER.indexOf(limbKey);
      await drawBodyLimb(limbKey, pose, cx_tab[limbIdx], cy_tab[limbIdx]);
    }
  }

  activeCtx = ctx;

  // Step 2: Find bounding box of rendered content on offscreen canvas
  const imgData = offCtx.getImageData(0, 0, OFFSCREEN_W, OFFSCREEN_H);
  const px = imgData.data;
  let minX = OFFSCREEN_W, minY = OFFSCREEN_H, maxX = 0, maxY = 0;
  for (let y = 0; y < OFFSCREEN_H; y++) {
    for (let x = 0; x < OFFSCREEN_W; x++) {
      if (px[(y * OFFSCREEN_W + x) * 4 + 3] > 0) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  // Step 3: Center the avatar on the visible canvas
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#A3A3A3';
  ctx.fillRect(0, 0, CW, CH);
  ctx.imageSmoothingEnabled = false;

  if (maxX >= minX && maxY >= minY) {
    const contentW = maxX - minX + 1;
    const contentH = maxY - minY + 1;
    const destX = Math.round((CW - contentW) / 2);
    const destY = Math.round((CH - contentH) / 2);
    ctx.drawImage(offCanvas, minX, minY, contentW, contentH, destX, destY, contentW, contentH);
  }
}

async function drawBodyLimb(limbName, pose, chainX, chainY) {
  const stateIdx = pose[limbName];
  if (stateIdx === null || stateIdx === undefined) return;

  const celNum = getCelNum(limbName, stateIdx);
  if (celNum === null) return;

  const celData = await getBodyCelImage(limbName, celNum);
  if (!celData || !celData.img) return;

  // C64 paint_1 positioning:
  //   Normal:   screen_x = cel_x + x_offset  (bytes)
  //   Reversed: screen_x = cel_x + (1 - x_offset - width_bytes)
  //   screen_y = cel_y - y_offset  (scanlines)
  //   In the simulator, BASE_Y = foot level. y_offset positions the cel top
  //   relative to BASE_Y. A cel with y_offset=height has its bottom at BASE_Y.
  const isBack = currentView === 'back';
  const widthBytes = (celData.native_width || celData.img.width) / 4;
  const xOff = isBack ? (1 - celData.x_offset - widthBytes) : celData.x_offset;

  const drawX = BASE_X + (chainX + xOff) * BYTE_PX;
  const drawY = BASE_Y + (chainY - celData.y_offset) * SCALE;
  const drawW = celData.img.width * SCALE;
  const drawH = celData.img.height * SCALE;

  // Recolor to temp canvas
  const tmp = document.createElement('canvas');
  tmp.width = celData.img.width;
  tmp.height = celData.img.height;
  const tc = tmp.getContext('2d');
  if (isBack) {
    // Flip horizontally for back view
    tc.translate(celData.img.width, 0);
    tc.scale(-1, 1);
  }
  tc.drawImage(celData.img, 0, 0);
  tc.setTransform(1, 0, 0, 1, 0, 0); // reset
  // Apply pattern-aware recoloring based on body zone
  const zone = LIMB_TO_ZONE[limbName];
  const patIdx = zone ? (bodyPatterns[zone] ?? 15) : 15;
  recolorWithPattern(tmp, SRC_COLORS, bodyColors, patIdx);

  // C64 paint.m: pixel 00 within a cel's data clears screen to background.
  // For overlay cels (legs_left), transparent pixels must overwrite underlying
  // content. We make transparent pixels opaque with background color for overlays.
  if (limbName === 'legs_left') {
    const td = tc.getImageData(0, 0, tmp.width, tmp.height);
    const tpx = td.data;
    for (let j = 0; j < tpx.length; j += 4) {
      if (tpx[j+3] < 128) {
        tpx[j] = 0xA3; tpx[j+1] = 0xA3; tpx[j+2] = 0xA3; tpx[j+3] = 255;
      }
    }
    tc.putImageData(td, 0, 0);
  }
  activeCtx.drawImage(tmp, drawX, drawY, drawW, drawH);
}

async function drawHead(pose, cx_tab, cy_tab) {
  const isBack = currentView === 'back';
  const headState = pose.head_state || 0;

  // C64 animate.m draw_a_limb for head (cel_number=4):
  // 1. Draw the contained head object at: cx_tab[4], cy_tab[4] - 63
  // 2. Draw the head_placeholder cel at: cx_tab[4], cy_tab[4] (via paint_limb)
  // The head_placeholder is a neck/collar piece that bridges head to torso.

  // Step 1: Draw the head object (if we have one)
  if (currentHead) {
    const celIndices = getHeadCelsForView(currentHead, headState);
    const headChainX = cx_tab[4]; // bytes
    const headChainY = cy_tab[4] - 63; // scanlines (constant from animate.m)

    for (const celIdx of celIndices) {
      const letter = "abcdefg"[celIdx];
      const src = `habitat_images_final/heads/${currentHead.name}_${currentHead.name}_data_${letter}.png`;
      const img = await loadImg(src);
      if (!img) continue;

      const tmp = document.createElement('canvas');
      tmp.width = img.width;
      tmp.height = img.height;
      const tc = tmp.getContext('2d');
      if (isBack) {
        tc.translate(img.width, 0);
        tc.scale(-1, 1);
      }
      tc.drawImage(img, 0, 0);
      tc.setTransform(1, 0, 0, 1, 0, 0);
      recolorCanvas(tmp, SRC_COLORS, headColors);

      const drawW = img.width * SCALE;
      const drawH = img.height * SCALE;

      const manifestKey = `${currentHead.name}_${currentHead.name}_data_${letter}.png`;
      const celMeta = headManifest ? headManifest[manifestKey] : null;

      let drawX, drawY;
      if (celMeta && celMeta.height < 100) {
        const widthBytes = (celMeta.native_width || img.width) / 4;
        const xOff = isBack ? (1 - celMeta.x_offset - widthBytes) : celMeta.x_offset;
        drawX = BASE_X + (headChainX + xOff) * BYTE_PX;
        drawY = BASE_Y + (headChainY - celMeta.y_offset) * SCALE;
      } else {
        drawX = BASE_X + headChainX * BYTE_PX;
        drawY = BASE_Y + headChainY * SCALE - drawH;
      }

      activeCtx.drawImage(tmp, drawX, drawY, drawW, drawH);
    }
  }

  // Step 2: Draw the head_placeholder (face/back overlay) on top
  // C64 animate.m draw_a_limb checks disk_face flags:
  //   Side view: draw if bit 6 (0x40) is set (face overlay)
  //   Front view: draw if bit 6 (0x40) is set (face overlay)
  //   Back view: draw if bit 7 (0x80) is set (back overlay)
  const cfg = headConfig && currentHead ? headConfig[currentHead.name] : null;
  const diskFace = cfg ? cfg.disk_face : 0;
  let drawPlaceholder = true;
  if (cfg) {
    if (currentView === 'back') {
      drawPlaceholder = !!(diskFace & 0x80); // bit 7: has back overlay
    } else {
      drawPlaceholder = !!(diskFace & 0x40); // bit 6: has face overlay
    }
  }
  if (drawPlaceholder) {
    await drawBodyLimb('head_placeholder', { head_placeholder: headState }, cx_tab[4], cy_tab[4]);
  }
}

// ============================================================
// ANIMATION
// ============================================================
function isAnimatedPose(pose) {
  const poseData = POSES[pose];
  if (!poseData) return false;
  const viewData = poseData[currentView] || poseData.side;
  return Array.isArray(viewData);
}

function startAnimation() {
  stopAnimation(true);
  if (isAnimatedPose(currentPose)) {
    // C64 Habitat: ~6 fps avatar animation (PAL 50Hz, ~8 VBlanks per render cycle)
    const speed = Math.round(1000 / 6); // 167ms = 6fps for all animations
    const poseData = POSES[currentPose];
    const viewData = poseData[currentView] || poseData.side;
    const frameCount = Array.isArray(viewData) ? viewData.length : 4;
    animInterval = setInterval(() => {
      // Point: play once and hold at last frame
      if (currentPose === 'point' && animFrame >= frameCount - 1) {
        clearInterval(animInterval);
        animInterval = null;
        return;
      }
      animFrame = (animFrame + 1) % frameCount;
      renderAvatar();
    }, speed);
  }
}

function stopAnimation(resetFrame) {
  if (animInterval) { clearInterval(animInterval); animInterval = null; }
  if (resetFrame) { animFrame = 0; }
  updateFrameLabel();
}

function updateFrameLabel() {
  const label = document.getElementById('frameLabel');
  if (!isAnimatedPose(currentPose)) {
    label.textContent = '—';
    return;
  }
  const poseData = POSES[currentPose];
  const viewData = poseData[currentView] || poseData.side;
  const count = Array.isArray(viewData) ? viewData.length : 1;
  label.textContent = `${animFrame + 1} / ${count}`;
}

// Frame stepper buttons
document.getElementById('framePrevBtn').addEventListener('click', async () => {
  if (!isAnimatedPose(currentPose)) return;
  stopAnimation(); // pause auto-animation
  const poseData = POSES[currentPose];
  const viewData = poseData[currentView] || poseData.side;
  const count = Array.isArray(viewData) ? viewData.length : 1;
  animFrame = (animFrame - 1 + count) % count;
  updateFrameLabel();
  await renderAvatar();
});

document.getElementById('frameNextBtn').addEventListener('click', async () => {
  if (!isAnimatedPose(currentPose)) return;
  stopAnimation(); // pause auto-animation
  const poseData = POSES[currentPose];
  const viewData = poseData[currentView] || poseData.side;
  const count = Array.isArray(viewData) ? viewData.length : 1;
  animFrame = (animFrame + 1) % count;
  updateFrameLabel();
  await renderAvatar();
});

// HEAD GRID
// ============================================================
const headGrid = document.getElementById('headGrid');
const searchInput = document.getElementById('searchInput');
const categoryFilter = document.getElementById('categoryFilter');

function buildGrid() {
  const search = searchInput.value.toLowerCase();
  const cat = categoryFilter.value;
  headGrid.innerHTML = '';

  const filtered = HEADS.filter(h => {
    if (search && !h.name.includes(search)) return false;
    if (cat === 'all') return true;
    if (cat === 'animated') return !!h.anim;
    return h.cat === cat;
  });

  document.getElementById('stats').textContent = `${filtered.length} of ${HEADS.length} heads`;

  for (const head of filtered) {
    const card = document.createElement('div');
    card.className = 'head-card' + (currentHead?.name === head.name ? ' selected' : '');
    card.dataset.name = head.name;

    const c = document.createElement('canvas');
    c.width = 56; c.height = 56;
    card.appendChild(c);
    renderThumb(head, c);

    const n = document.createElement('div');
    n.className = 'name';
    n.textContent = head.name;
    card.appendChild(n);

    if (head.anim) {
      const b = document.createElement('div');
      b.className = 'badge anim'; b.title = 'Animated';
      card.appendChild(b);
    }

    card.addEventListener('click', () => selectHead(head));
    headGrid.appendChild(card);
  }
}

async function renderThumb(head, thumbCanvas) {
  const celIndices = getHeadCelsForView(head, 0); // side view
  const tc = thumbCanvas.getContext('2d');
  tc.fillStyle = '#A3A3A3';
  tc.fillRect(0, 0, 56, 56);
  tc.imageSmoothingEnabled = false;

  for (const ci of celIndices.length > 0 ? celIndices : [0]) {
    const letter = "abcdefg"[ci];
    const src = `habitat_images_final/heads/${head.name}_${head.name}_data_${letter}.png`;
    const img = await loadImg(src);
    if (!img) continue;

    const tmp = document.createElement('canvas');
    tmp.width = img.width; tmp.height = img.height;
    const tmpCtx = tmp.getContext('2d');
    tmpCtx.drawImage(img, 0, 0);
    recolorCanvas(tmp, SRC_COLORS, headColors);

    // Fit in thumbnail - no extra stretch
    const scale = Math.min(50/img.width, 50/img.height, 3);
    const dw = img.width * scale, dh = img.height * scale;
    tc.drawImage(tmp, (56-dw)/2, (56-dh)/2, dw, dh);
  }
}

function selectHead(head) {
  currentHead = head;
  renderAvatar();
  updateInfo(head);
  document.querySelectorAll('.head-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.name === head.name));
}

function updateInfo(head) {
  const info = document.getElementById('headInfo');
  const tags = [];
  if (head.cat === 'player') tags.push('<span class="tag player">Player Head</span>');
  tags.push(`<span class="tag">${head.cat}</span>`);
  if (head.gender) tags.push(`<span class="tag female">${head.gender==='f'?'Female':'Male'}</span>`);
  if (head.anim) tags.push('<span class="tag animated">Animated</span>');
  info.innerHTML = `<h3>${head.name}</h3><div class="detail">${tags.join(' ')}</div>
    <div class="detail">Cels: ${head.cels} | States: ${head.masks.length}</div>
    ${head.cat==='player' ? '<div class="detail" style="color:#4caf50">Player-selectable at character creation</div>' : ''}`;
}

// Generate a small pattern swatch canvas (8x8 pixels)
function makePatternSwatch(patIdx) {
  const c = document.createElement('canvas');
  c.width = 8; c.height = 8;
  c.className = 'pattern-swatch';
  c.title = `${patIdx}: ${PATTERN_NAMES[patIdx]}`;
  const gc = c.getContext('2d');
  const pattern = CEL_PATTERNS[patIdx];
  // Color map: 00=bg, 01=blue, 10=black, 11=pink
  const colors = ['#2a2a3e','#312893','#000000','#A96F63'];
  for (let y = 0; y < 8; y++) {
    const patByte = pattern[y % 4];
    for (let mcX = 0; mcX < 4; mcX++) {
      const shift = 6 - mcX * 2;
      const val = (patByte >> shift) & 0x03;
      gc.fillStyle = colors[val];
      gc.fillRect(mcX * 2, y, 2, 1);
    }
  }
  return c;
}

(function buildPatternSelectors() {
  const zones = [
    { id: 'patTorsoSwatches', zone: 'torso' },
    { id: 'patArmsSwatches', zone: 'arms' },
    { id: 'patLegsSwatches', zone: 'legs' },
  ];
  for (const { id, zone } of zones) {
    const container = document.getElementById(id);
    for (let i = 0; i < CEL_PATTERNS.length; i++) {
      const swatch = makePatternSwatch(i);
      if (i === bodyPatterns[zone]) swatch.classList.add('active');
      swatch.addEventListener('click', function() {
        bodyPatterns[zone] = i;
        container.querySelectorAll('.pattern-swatch').forEach(s => s.classList.remove('active'));
        this.classList.add('active');
        renderAvatar();
      });
      container.appendChild(swatch);
    }
  }
})();

// ============================================================
// HEAD CHANGE SEQUENCE
// Simulates the in-game flow: GET head, PUT on ground, turn,
// GET new head, PUT head on — as described in the Avatar Handbook
// ============================================================
const HEAD_CHANGE_STEPS = [
  { action:"Standing",           desc:"Avatar with current head",          pose:"stand", view:"side", showHead:true,  holdHead:false, groundHead:false, headType:"old" },
  { action:"GET head",           desc:"Head comes off into hands",         pose:"bend",  view:"side", showHead:false, holdHead:true,  groundHead:false, headType:"old" },
  { action:"Holding head",       desc:"Standing headless, holding head",   pose:"stand", view:"side", showHead:false, holdHead:true,  groundHead:false, headType:"old" },
  { action:"PUT head down",      desc:"Bending to place head on ground",   pose:"bend",  view:"side", showHead:false, holdHead:false, groundHead:true,  headType:"old" },
  { action:"Head on ground",     desc:"Standing headless, head on ground", pose:"stand", view:"side", showHead:false, holdHead:false, groundHead:true,  headType:"old" },
  { action:"Turn around",        desc:"Turning to face the new head",      pose:"stand", view:"front", showHead:false, holdHead:false, groundHead:false, headType:null },
  { action:"Facing other side",  desc:"New head is on this side",          pose:"stand", view:"side", showHead:false, holdHead:false, groundHead:true,  headType:"new", flipped:true },
  { action:"GET new head",       desc:"Bending to pick up new head",       pose:"bend",  view:"side", showHead:false, holdHead:false, groundHead:true,  headType:"new", flipped:true },
  { action:"Holding new head",   desc:"Standing with new head in hand",    pose:"stand", view:"side", showHead:false, holdHead:true,  groundHead:false, headType:"new", flipped:true },
  { action:"PUT head on",        desc:"New head goes on shoulders!",        pose:"stand", view:"side", showHead:true,  holdHead:false, groundHead:false, headType:"new", flipped:true },
  { action:"Done!",              desc:"Avatar with new head",              pose:"stand", view:"side", showHead:true,  holdHead:false, groundHead:false, headType:"new" },
];

function startSequence() {
  if (!currentHead) { selectHead(HEADS[0]); }
  seqOldHead = currentHead;
  // Pick a different random head for the new head
  let newIdx;
  do { newIdx = Math.floor(Math.random() * HEADS.length); } while (HEADS[newIdx] === seqOldHead);
  seqNewHead = HEADS[newIdx];
  seqStep = 0;
  seqActive = true;
  seqAutoplay = false;
  seqFlipped = false;
  stopAnimation(true);
  document.getElementById('sequencePanel').classList.add('active');
  document.getElementById('headChangeBtn').classList.add('active');
  buildSequenceProgress();
  applySequenceStep();
}

function stopSequence() {
  seqActive = false;
  seqAutoplay = false;
  if (seqAutoTimer) { clearTimeout(seqAutoTimer); seqAutoTimer = null; }
  document.getElementById('sequencePanel').classList.remove('active');
  document.getElementById('headChangeBtn').classList.remove('active');
  // Restore to final head if completed, else restore old
  if (seqStep >= HEAD_CHANGE_STEPS.length - 1) {
    currentHead = seqNewHead;
    selectHead(seqNewHead);
  } else {
    currentHead = seqOldHead;
  }
  currentView = 'side';
  currentPose = 'stand';
  document.querySelectorAll('[data-view]').forEach(b => {
    b.classList.toggle('active', b.dataset.view === 'side');
  });
  document.querySelectorAll('[data-pose]').forEach(b => {
    b.classList.toggle('active', b.dataset.pose === 'stand');
  });
  document.getElementById('viewLabel').textContent = 'Side View \u2014 Standing';
  renderAvatar();
}

function buildSequenceProgress() {
  const container = document.getElementById('sequenceProgress');
  container.innerHTML = '';
  for (let i = 0; i < HEAD_CHANGE_STEPS.length; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    container.appendChild(pip);
  }
  updateSequenceProgress();
}

function updateSequenceProgress() {
  const pips = document.querySelectorAll('#sequenceProgress .pip');
  pips.forEach((p, i) => {
    p.className = 'pip' + (i < seqStep ? ' done' : '') + (i === seqStep ? ' current' : '');
  });
}

function applySequenceStep() {
  const step = HEAD_CHANGE_STEPS[seqStep];
  // Update step display
  document.querySelector('#sequenceStep .step-num').textContent = `${seqStep + 1}/${HEAD_CHANGE_STEPS.length}`;
  document.querySelector('#sequenceStep .step-desc').textContent = `${step.action} — ${step.desc}`;
  // Update next button text
  const nextBtn = document.getElementById('seqNextBtn');
  if (seqStep >= HEAD_CHANGE_STEPS.length - 1) {
    nextBtn.textContent = 'Finish';
  } else {
    const next = HEAD_CHANGE_STEPS[seqStep + 1];
    nextBtn.textContent = next.action;
  }
  updateSequenceProgress();

  // Apply pose/view
  currentPose = step.pose;
  currentView = step.view;
  seqFlipped = !!step.flipped;

  // Set head for rendering
  if (step.headType === 'old') currentHead = seqOldHead;
  else if (step.headType === 'new') currentHead = seqNewHead;

  // Update view label
  const labels = { side:'Side View', front:'Front View', back:'Back View' };
  document.getElementById('viewLabel').textContent = labels[currentView] + ' \u2014 ' + step.action;

  renderSequenceFrame(step);

  // Auto-advance
  if (seqAutoplay && seqStep < HEAD_CHANGE_STEPS.length - 1) {
    const delay = 1000;
    seqAutoTimer = setTimeout(() => { advanceSequence(); }, delay);
  }
}

function advanceSequence() {
  if (seqStep >= HEAD_CHANGE_STEPS.length - 1) {
    stopSequence();
    return;
  }
  seqStep++;
  applySequenceStep();
}

async function renderSequenceFrame(step) {
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#A3A3A3';
  ctx.fillRect(0, 0, CW, CH);
  ctx.imageSmoothingEnabled = false;

  // For sequence: show the key pose frame (e.g. fully bent, not standing)
  if (step.pose === 'bend') animFrame = 2;  // fully bent frame
  else if (step.pose === 'point') animFrame = 2;  // full point frame
  else animFrame = 0;

  const pose = getPoseConfig();
  const drawOrder = DRAW_ORDER[currentView] || DRAW_ORDER.side;

  // If flipped, mirror the canvas
  if (seqFlipped) {
    ctx.save();
    ctx.translate(CW, 0);
    ctx.scale(-1, 1);
  }

  const isBack = currentView === 'back';
  const { cx_tab, cy_tab } = await computeLimbPositions(pose, isBack);
  for (const limbKey of drawOrder) {
    if (limbKey === 'head') {
      if (step.showHead) await drawHead(pose, cx_tab, cy_tab);
    } else {
      const limbIdx = LIMB_ORDER.indexOf(limbKey);
      await drawBodyLimb(limbKey, pose, cx_tab[limbIdx], cy_tab[limbIdx]);
    }
  }

  // Draw held head (near hand/arm position)
  if (step.holdHead && currentHead) {
    const headForHold = step.headType === 'new' ? seqNewHead : seqOldHead;
    await drawMiniHead(headForHold, step.pose === 'bend' ? 'low' : 'mid');
  }

  // Draw head on ground
  if (step.groundHead) {
    const headForGround = step.headType === 'new' ? seqNewHead : seqOldHead;
    await drawMiniHead(headForGround, 'ground');
  }

  if (seqFlipped) {
    ctx.restore();
  }
}

async function drawMiniHead(head, position) {
  if (!head) return;
  const celIndices = getHeadCelsForView(head, 0); // side view
  for (const ci of celIndices.length > 0 ? celIndices : [0]) {
    const letter = "abcdefg"[ci];
    const src = `habitat_images_final/heads/${head.name}_${head.name}_data_${letter}.png`;
    const img = await loadImg(src);
    if (!img) continue;

    const tmp = document.createElement('canvas');
    tmp.width = img.width; tmp.height = img.height;
    const tc = tmp.getContext('2d');
    tc.drawImage(img, 0, 0);
    recolorCanvas(tmp, SRC_COLORS, headColors);

    const miniScale = SCALE * 0.7;
    const drawW = img.width * miniScale;
    const drawH = img.height * miniScale;

    let drawX, drawY;
    if (position === 'ground') {
      // On the ground, slightly to the side
      drawX = BASE_X + 60;
      drawY = BASE_Y - drawH - 4;
    } else if (position === 'low') {
      // In hands while bending (low position)
      drawX = BASE_X + 40;
      drawY = BASE_Y - drawH - 20;
    } else {
      // Mid position (held while standing)
      drawX = BASE_X + 35;
      drawY = BASE_Y - 120;
    }

    ctx.drawImage(tmp, drawX, drawY, drawW, drawH);
  }
}


// Sequence UI events
document.getElementById('headChangeBtn').addEventListener('click', () => {
  if (seqActive) stopSequence();
  else startSequence();
});

document.getElementById('seqNextBtn').addEventListener('click', () => {
  if (seqAutoplay) {
    seqAutoplay = false;
    if (seqAutoTimer) { clearTimeout(seqAutoTimer); seqAutoTimer = null; }
    document.getElementById('seqAutoBtn').textContent = 'Autoplay';
  }
  advanceSequence();
});

document.getElementById('seqAutoBtn').addEventListener('click', () => {
  seqAutoplay = !seqAutoplay;
  document.getElementById('seqAutoBtn').textContent = seqAutoplay ? 'Pause' : 'Autoplay';
  if (seqAutoplay) {
    applySequenceStep(); // triggers auto-advance
  } else {
    if (seqAutoTimer) { clearTimeout(seqAutoTimer); seqAutoTimer = null; }
  }
});

document.getElementById('seqStopBtn').addEventListener('click', stopSequence);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  else if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
  else if (e.key === ' ' || e.key === 'r') { e.preventDefault(); document.getElementById('randomBtn').click(); }
  else if (e.key === '1') document.querySelector('[data-view="side"]').click();
  else if (e.key === '2') document.querySelector('[data-view="front"]').click();
  else if (e.key === '3') document.querySelector('[data-view="back"]').click();
});

// ============================================================
// INIT
// ============================================================
Promise.all([loadBodyManifest(), loadHeadManifest(), loadHeadConfig()]).then(() => {
  buildGrid();
  selectHead(HEADS[Math.floor(Math.random() * HEADS.length)]);
});
